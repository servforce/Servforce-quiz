<section x-data="adminLoginPage()">
  <h3 class="section-title">后台登录</h3>
  <p class="section-subtitle">
    新控制台沿用后台会话能力。当前阶段只先打通登录、任务系统与 legacy bridge。
  </p>
  <form class="mt-6 grid max-w-xl gap-4" @submit.prevent="submit()">
    <label class="grid gap-2">
      <span class="text-sm font-medium text-slate-600">账号</span>
      <input
        x-model="form.username"
        class="rounded-md border border-blue-100 bg-white px-4 py-3 text-sm text-slate-900 outline-none ring-0 focus:border-blue-300"
        type="text"
        autocomplete="username"
      />
    </label>
    <label class="grid gap-2">
      <span class="text-sm font-medium text-slate-600">密码</span>
      <input
        x-model="form.password"
        class="rounded-md border border-blue-100 bg-white px-4 py-3 text-sm text-slate-900 outline-none ring-0 focus:border-blue-300"
        type="password"
        autocomplete="current-password"
      />
    </label>
    <template x-if="error">
      <p class="rounded-md border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-600" x-text="error"></p>
    </template>
    <div class="action-row">
      <button class="btn-primary" type="submit" :disabled="pending" x-text="pending ? '登录中...' : '登录'"></button>
      <a class="btn-secondary" href="/legacy/admin/login">进入旧登录页</a>
    </div>
  </form>
</section>
