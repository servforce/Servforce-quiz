<section x-data="adminJobsPage()" x-init="init()">
  <h3 class="section-title">任务系统</h3>
  <p class="section-subtitle">
    新 worker / scheduler 先以轻量 JSON 队列跑通流程边界，后续再接正式 repository 与真实业务任务。
  </p>
  <div class="action-row">
    <button class="btn-primary" type="button" @click="enqueue('scan_exams')">投递试卷扫描</button>
    <button class="btn-secondary" type="button" @click="enqueue('resume_parse')">投递简历解析</button>
    <button class="btn-secondary" type="button" @click="enqueue('grade_attempt')">投递判卷任务</button>
    <button class="btn-secondary" type="button" @click="refresh()">刷新列表</button>
  </div>
  <table class="jobs-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>类型</th>
        <th>状态</th>
        <th>来源</th>
        <th>更新时间</th>
      </tr>
    </thead>
    <tbody>
      <template x-for="job in jobs" :key="job.id">
        <tr>
          <td x-text="job.id"></td>
          <td x-text="job.kind"></td>
          <td x-text="job.status"></td>
          <td x-text="job.source"></td>
          <td x-text="job.updated_at"></td>
        </tr>
      </template>
      <tr x-show="jobs.length === 0">
        <td colspan="5">当前没有任务。</td>
      </tr>
    </tbody>
  </table>
</section>
