<div x-show="route.name === 'quiz-detail'" class="admin-mobile-pane-grid grid gap-4 xl:grid-cols-[minmax(0,1fr)_22rem] 2xl:grid-cols-[minmax(0,1fr)_24rem]">
            <div
              x-show="shouldShowAdminCompactTabs('quiz-detail')"
              x-cloak
              data-admin-compact-tabs="quiz-detail"
              class="hidden admin-compact-tabs md:block xl:hidden"
            >
              <div class="admin-compact-tabs__track" role="tablist" aria-label="测验详情内容切换">
                <template x-for="tab in adminCompactTabs('quiz-detail')" :key="tab.id">
                  <button
                    type="button"
                    role="tab"
                    @click="setAdminCompactTab('quiz-detail', tab.id)"
                    :class="adminCompactTab('quiz-detail') === tab.id ? 'admin-compact-tab--active' : 'admin-compact-tab--inactive'"
                    :aria-selected="String(adminCompactTab('quiz-detail') === tab.id)"
                    class="admin-compact-tab"
                    x-text="tab.label"
                  ></button>
                </template>
              </div>
            </div>

              <section
                x-show="adminCompactPanelVisible('quiz-detail', 'content')"
                class="admin-surface rounded-3xl border border-white/70 bg-white/82 p-5 shadow-[var(--admin-shadow)] backdrop-blur-xl"
              >
              <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
                <div class="min-w-0">
                  <div class="flex flex-wrap items-center gap-2">
                    <h2 class="truncate text-2xl font-semibold tracking-[-0.03em] text-slate-900" x-text="quizDetail.quiz?.title || quizDetail.quiz?.quiz_key"></h2>
                    <span class="rounded-full border border-blue-100 bg-blue-50 px-2.5 py-1 text-[11px] font-semibold text-blue-700" x-text="quizDetail.quiz?.quiz_key"></span>
                  </div>
                  <div class="mt-3 flex flex-wrap gap-2 text-xs text-slate-600">
                    <span class="rounded-full bg-slate-100 px-2.5 py-1">状态 <strong x-text="quizDetail.quiz?.status"></strong></span>
                    <span class="rounded-full bg-slate-100 px-2.5 py-1">当前版本 <strong x-text="quizDetail.quiz?.current_version_no || '-'"></strong></span>
                    <span class="rounded-full bg-slate-100 px-2.5 py-1">浏览版本 <strong x-text="quizDetail.selected_quiz_version?.version_no || '-'"></strong></span>
                    <span class="rounded-full bg-slate-100 px-2.5 py-1">题目数 <strong x-text="quizDetail.stats?.total_questions || 0"></strong></span>
                    <span class="rounded-full bg-slate-100 px-2.5 py-1">预计 <strong x-text="quizDetail.quiz?.estimated_duration_minutes || 0"></strong> 分钟</span>
                    <span class="rounded-full bg-slate-100 px-2.5 py-1">格式 <strong x-text="quizDetail.quiz?.format || '-'"></strong></span>
                  </div>
                  <div x-show="(quizDetail.quiz?.tags || []).length" class="mt-3 flex flex-wrap gap-2 text-xs text-slate-500">
                    <template x-for="tag in (quizDetail.quiz?.tags || [])" :key="tag">
                      <span class="rounded-full border border-slate-200 bg-slate-50 px-2.5 py-1" x-text="tag"></span>
                    </template>
                  </div>
                </div>
                <button @click="togglePublicInvite" type="button" class="rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-2.5 text-sm font-medium text-emerald-700 transition hover:bg-emerald-100">
                  <span x-text="quizDetail.quiz?.public_invite_enabled ? '关闭公开邀约' : '开启公开邀约'"></span>
                </button>
              </div>

              <div class="mt-5 grid gap-4">
                <div class="admin-quiz-overview-card overflow-hidden rounded-2xl border border-blue-100 bg-blue-50/70">
                  <div class="admin-quiz-summary-split">
                    <section class="admin-quiz-summary-score px-4 py-4 md:px-5">
                      <div class="text-xs uppercase tracking-[0.18em] text-slate-500">总分</div>
                      <div class="mt-3 text-3xl font-semibold text-slate-900" x-text="quizDetail.stats?.total_points || 0"></div>
                    </section>
                    <section x-show="traitDimensions().length" class="admin-quiz-summary-traits px-4 py-4 md:px-5">
                      <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
                        <div class="text-xs uppercase tracking-[0.18em] text-slate-500">Traits 维度</div>
                        <div class="rounded-full border border-slate-200 bg-white/80 px-3 py-1 text-xs font-semibold text-slate-600">
                          <span x-text="traitDimensions().length"></span>
                          个维度
                        </div>
                      </div>
                      <div class="mt-4 flex flex-wrap gap-2.5">
                        <template x-for="dimension in traitDimensions()" :key="dimension.name">
                          <span :style="traitBadgeStyle(dimension.name)" class="inline-flex items-center gap-2 rounded-full border px-3 py-1.5 text-xs font-semibold">
                            <span :style="traitDotStyle(dimension.name)" class="h-2 w-2 rounded-full"></span>
                            <span x-text="dimension.name"></span>
                          </span>
                        </template>
                      </div>
                    </section>
                  </div>
                </div>
                <div
                  x-show="quizDetail.quiz?.public_invite_enabled && quizDetail.quiz?.public_invite_url"
                  class="admin-quiz-overview-card rounded-2xl border border-blue-100 bg-blue-50/70 px-4 py-3"
                >
                  <div
                    class="admin-public-invite-card flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between"
                  >
                    <div class="min-w-0 flex-1">
                      <div class="text-sm font-medium text-slate-700">公开链接</div>
                      <a
                        :href="quizDetail.quiz?.public_invite_url"
                        target="_blank"
                        rel="noreferrer"
                        class="mt-2 block break-all text-sm text-blue-700 underline decoration-blue-200 underline-offset-4"
                        x-text="quizDetail.quiz?.public_invite_url"
                      ></a>
                      <div class="mt-3 text-xs leading-6 text-slate-600">
                        可直接分享链接，或让候选人扫码进入该测验的公开邀约入口。
                      </div>
                    </div>
                    <div
                      x-show="quizDetail.quiz?.public_invite_qr_url"
                      class="flex shrink-0 items-start gap-3 lg:pl-4"
                    >
                      <button
                        type="button"
                        @click="copyAssignmentQr({ qr_url: quizDetail.quiz?.public_invite_qr_url })"
                        class="admin-public-invite-qr-button overflow-hidden rounded-xl transition hover:opacity-85"
                        title="点击复制二维码"
                        aria-label="点击复制公开邀约二维码"
                      >
                        <img
                          :src="quizDetail.quiz?.public_invite_qr_url"
                          alt="公开邀约二维码"
                          class="admin-public-invite-qr rounded-xl object-contain"
                        />
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <article
                x-show="quizDetail.selected_quiz_version?.spec?.welcome_image"
                class="relative mt-5 overflow-hidden rounded-3xl border border-blue-100/90 bg-slate-950 shadow-[0_12px_30px_rgba(37,99,235,0.10)]"
              >
                <img
                  :src="quizDetail.selected_quiz_version?.spec?.welcome_image || ''"
                  alt="测验 intro 图片"
                  class="block h-64 w-full object-cover object-center"
                />
                <div class="pointer-events-none absolute inset-0 bg-linear-to-t from-slate-950/88 via-slate-950/20 to-transparent"></div>
                <div class="absolute inset-x-0 bottom-0 p-5 sm:p-6">
                  <div class="inline-flex rounded-full border border-white/20 bg-white/12 px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.18em] text-white/90">
                    Intro 图片
                  </div>
                  <div class="mt-3 max-w-2xl text-sm font-medium leading-6 text-white/92">
                    候选人开始答题前展示的欢迎图。
                  </div>
                </div>
              </article>

              <div class="mt-6">
                <div class="flex flex-col gap-3 lg:flex-row lg:items-end lg:justify-between">
                  <div>
                    <div class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">测验浏览</div>
                    <h3 class="mt-1 text-lg font-semibold tracking-[-0.03em] text-slate-900">按题预览当前选择版本</h3>
                    <p class="mt-1 text-sm text-slate-600">恢复卡片式浏览视图，直接查看题干、选项和评分标准。</p>
                  </div>
                  <div class="flex flex-wrap gap-2 text-xs text-slate-500">
                    <template x-for="(count, type) in (quizDetail.stats?.counts_by_type || {})" :key="type">
                      <span class="rounded-full border border-slate-200 bg-slate-50 px-2.5 py-1">
                        <span x-text="questionTypeLabel(type)"></span>
                        <strong class="text-slate-700" x-text="' ' + count + ' 题'"></strong>
                      </span>
                    </template>
                  </div>
                </div>

                <div x-show="quizQuestions().length" class="mt-4 grid gap-3">
                  <template x-for="(question, index) in quizQuestions()" :key="question.qid || index">
                    <article class="overflow-hidden rounded-3xl border border-blue-100/90 bg-white shadow-[0_12px_30px_rgba(37,99,235,0.08)]">
                      <div class="border-b border-slate-200/80 bg-linear-to-r from-blue-50/90 via-white to-emerald-50/70 px-4 py-3">
                        <div class="flex items-center justify-between gap-3">
                          <div class="flex min-w-0 flex-nowrap items-center gap-2 overflow-hidden">
                            <span class="shrink-0 text-[17px] font-black tracking-[-0.03em] text-slate-900" x-text="question.label || question.qid || ('Q' + (index + 1))"></span>
                            <span class="shrink-0 rounded-full border border-blue-200 bg-blue-50 px-2.5 py-1 text-xs font-semibold text-blue-700" x-text="questionTypeLabel(question.type)"></span>
                            <span class="shrink-0 rounded-full border border-slate-200 bg-white px-2.5 py-1 text-xs font-semibold text-slate-700" x-text="(question.max_points || 0) + ' 分'"></span>
                          </div>
                          <div class="flex shrink-0 items-center justify-end pl-2">
                            <div
                              x-show="Number(question.answer_time_seconds || 0) > 0"
                              class="text-[11px] font-medium tabular-nums text-slate-400"
                              x-text="'答题用时 ' + formatAnswerTime(question.answer_time_seconds)"
                            ></div>
                          </div>
                        </div>
                      </div>

                      <div class="px-4 py-3">
                        <div class="quiz-rich admin-markdown text-sm leading-6 text-slate-800" x-html="question.stem_html || ''"></div>

                        <template x-if="(question.options || []).length">
                          <div class="mt-3 overflow-hidden rounded-xl border border-blue-100 bg-slate-50/80 divide-y divide-blue-100">
                            <template x-for="option in (question.options || [])" :key="`${question.qid || index}-${option.key || option.text || ''}`">
                              <div
                                :class="option.correct ? 'bg-emerald-50/70' : 'bg-slate-50/80'"
                                class="flex items-center gap-2.5 px-3 py-2.5"
                              >
                                <span class="inline-flex h-6 min-w-6 shrink-0 items-center justify-center rounded-lg border border-blue-100 bg-white px-1.5 text-[11px] font-semibold text-blue-700" x-text="option.key || '-'"></span>
                                <div class="quiz-rich admin-markdown min-w-0 flex-1 text-sm leading-5 text-slate-700" x-html="option.text_html || ''"></div>
                                <div x-show="optionTraits(option).length" class="ml-auto flex flex-wrap justify-end gap-1.5 pl-2">
                                    <template x-for="trait in optionTraits(option)" :key="`${option.key || ''}-${trait.name}`">
                                      <span :style="traitBadgeStyle(trait.name)" class="rounded-full border px-2 py-0.5 text-[11px] font-medium">
                                        <span x-text="trait.name"></span>
                                        <span class="ml-1 font-semibold" x-text="trait.scoreText"></span>
                                      </span>
                                    </template>
                                </div>
                                <span x-show="option.correct" class="shrink-0 rounded-full border border-emerald-200 bg-white px-2 py-0.5 text-[11px] font-semibold text-emerald-700">正确</span>
                              </div>
                            </template>
                          </div>
                        </template>

                        <template x-if="question.rubric">
                          <details class="mt-3 overflow-hidden rounded-xl border border-slate-200 bg-slate-50/80">
                            <summary class="cursor-pointer px-3.5 py-2.5 text-[13px] font-medium text-slate-700">评分标准</summary>
                            <div class="quiz-rich admin-markdown border-t border-slate-200 px-3.5 py-2.5 text-[11px] leading-5 text-slate-600" x-html="question.rubric_html || ''"></div>
                          </details>
                        </template>
                      </div>
                    </article>
                  </template>
                </div>

                <div x-show="!quizQuestions().length" class="mt-4 rounded-2xl border border-dashed border-slate-200 bg-slate-50/75 px-6 py-10 text-center">
                  <div class="text-sm font-semibold text-slate-700">当前版本暂无可预览题目</div>
                  <p class="mt-2 text-sm leading-6 text-slate-500">请检查该版本快照是否包含 `questions` 数据。</p>
                </div>

                <article
                  x-show="quizDetail.selected_quiz_version?.spec?.end_image"
                  class="relative mt-4 overflow-hidden rounded-3xl border border-blue-100/90 bg-slate-950 shadow-[0_12px_30px_rgba(37,99,235,0.10)]"
                >
                  <img
                    :src="quizDetail.selected_quiz_version?.spec?.end_image || ''"
                    alt="测验 outro 图片"
                    class="block h-64 w-full object-cover object-center"
                  />
                  <div class="pointer-events-none absolute inset-0 bg-linear-to-t from-slate-950/88 via-slate-950/20 to-transparent"></div>
                  <div class="absolute inset-x-0 bottom-0 p-5 sm:p-6">
                    <div class="inline-flex rounded-full border border-white/20 bg-white/12 px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.18em] text-white/90">
                      Outro 图片
                    </div>
                    <div class="mt-3 max-w-2xl text-sm font-medium leading-6 text-white/92">
                      候选人完成所有题目后，在结果页前展示的收尾图。
                    </div>
                  </div>
                </article>
              </div>
            </section>

            <section
              x-show="adminCompactPanelVisible('quiz-detail', 'history')"
              class="admin-surface self-start rounded-3xl border border-white/70 bg-white/82 p-5 shadow-[var(--admin-shadow)] backdrop-blur-xl xl:sticky xl:top-6"
            >
              <div class="flex items-start justify-between gap-3">
                <div>
                  <h2 class="text-xl font-semibold tracking-[-0.03em] text-slate-900">版本历史</h2>
                  <p class="mt-1 text-sm text-slate-600">点击切换浏览不同版本的测验内容。</p>
                </div>
                <div class="rounded-full border border-blue-100 bg-blue-50 px-3 py-1 text-xs font-semibold text-blue-700">
                  <span x-text="(quizDetail.quiz_version_history || []).length"></span>
                  个版本
                </div>
              </div>

              <div class="mt-4 space-y-3">
                <template x-for="version in quizDetail.quiz_version_history || []" :key="version.id">
                  <button
                    type="button"
                    @click="loadQuizVersion(version.id)"
                    :class="version.is_selected ? 'border-blue-300 bg-blue-50/70 shadow-[0_12px_28px_rgba(37,99,235,0.10)]' : 'border-blue-100 bg-white hover:border-blue-200 hover:bg-blue-50/40'"
                    class="w-full rounded-xl border p-4 text-left transition"
                  >
                    <div class="flex items-start justify-between gap-3">
                      <div class="min-w-0">
                        <div class="flex flex-wrap items-center gap-2">
                          <div class="font-semibold text-slate-900">版本 <span x-text="version.version_no || version.id"></span></div>
                          <span x-show="version.is_current" class="rounded-full border border-emerald-200 bg-emerald-50 px-2.5 py-1 text-[11px] font-semibold text-emerald-700">当前</span>
                          <span x-show="version.is_selected && !version.is_current" class="rounded-full border border-blue-200 bg-white px-2.5 py-1 text-[11px] font-semibold text-blue-700">已选</span>
                        </div>
                        <div class="mt-2 break-all font-mono text-[11px] leading-5 text-slate-500" x-text="version.git_commit || '-'"></div>
                      </div>
                      <span class="material-symbols-rounded text-slate-400" x-text="version.is_selected ? 'visibility' : 'chevron_right'"></span>
                    </div>

                    <div class="mt-3 space-y-2 text-xs leading-5 text-slate-500">
                      <div x-show="version.source_path" class="break-all">
                        <span class="font-semibold text-slate-600">文件：</span>
                        <span x-text="version.source_path"></span>
                      </div>
                      <div x-show="version.created_at">
                        <span class="font-semibold text-slate-600">创建时间：</span>
                        <span x-text="formatDateTime(version.created_at)"></span>
                      </div>
                    </div>
                  </button>
                </template>
              </div>

              <div x-show="!(quizDetail.quiz_version_history || []).length" class="mt-4 rounded-xl border border-dashed border-slate-200 bg-slate-50/70 px-4 py-6 text-center text-sm text-slate-500">
                暂无版本历史
              </div>
            </section>
          </div>
