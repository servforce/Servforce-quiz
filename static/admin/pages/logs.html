<div x-show="route.name === 'logs'" class="admin-mobile-pane-grid grid gap-4 xl:grid-cols-[1.15fr_0.85fr]">
            <div
              x-show="shouldShowAdminCompactTabs('logs')"
              x-cloak
              data-admin-compact-tabs="logs"
              class="hidden admin-compact-tabs md:block xl:hidden"
            >
              <div class="admin-compact-tabs__track" role="tablist" aria-label="系统日志内容切换">
                <template x-for="tab in adminCompactTabs('logs')" :key="tab.id">
                  <button
                    type="button"
                    role="tab"
                    @click="setAdminCompactTab('logs', tab.id)"
                    :class="adminCompactTab('logs') === tab.id ? 'admin-compact-tab--active' : 'admin-compact-tab--inactive'"
                    :aria-selected="String(adminCompactTab('logs') === tab.id)"
                    class="admin-compact-tab"
                    x-text="tab.label"
                  ></button>
                </template>
              </div>
            </div>

            <section
              x-show="adminCompactPanelVisible('logs', 'list')"
              class="admin-surface rounded-3xl border border-white/70 bg-white/82 p-5 shadow-[var(--admin-shadow)] backdrop-blur-xl"
            >
              <div class="flex items-center justify-between gap-3">
                <div>
                  <h2 class="text-xl font-semibold tracking-[-0.03em] text-slate-900">系统日志</h2>
                  <p class="mt-1 text-sm text-slate-600">候选人、测验、邀约、判卷和系统告警日志。</p>
                </div>
                <button @click="loadLogs" type="button" class="whitespace-nowrap rounded-lg border border-blue-100 bg-blue-50 px-2 py-2.5 text-sm font-medium text-blue-700 transition hover:bg-blue-100">刷新</button>
              </div>
              <div class="admin-subsurface mt-5 overflow-hidden rounded-2xl border border-blue-100/80 bg-white/72">
                <template x-for="item in logs.items" :key="item.id">
                  <div class="grid gap-2 border-b border-slate-100 px-4 py-3 last:border-b-0 sm:grid-cols-[minmax(0,1fr)_220px] sm:items-start sm:gap-4">
                    <div class="min-w-0">
                      <div class="text-sm font-semibold text-slate-900" x-text="item.type_label"></div>
                      <div class="mt-1 text-sm leading-6 text-slate-700" x-text="item.detail_text"></div>
                    </div>
                    <div class="font-mono text-xs text-slate-500 sm:pt-0.5 sm:text-right" x-text="item.at_display"></div>
                  </div>
                </template>
                <div x-show="!(logs.items || []).length" class="px-4 py-10 text-center text-sm text-slate-500">
                  当前暂无系统日志
                </div>
              </div>
            </section>
            <section
              x-show="adminCompactPanelVisible('logs', 'trend')"
              class="admin-surface rounded-3xl border border-white/70 bg-white/82 p-5 shadow-[var(--admin-shadow)] backdrop-blur-xl"
            >
              <div class="flex flex-wrap items-start justify-between gap-3">
                <div>
                  <h2 class="text-xl font-semibold tracking-[-0.03em] text-slate-900">分类趋势</h2>
                  <p class="mt-1 text-sm text-slate-600">恢复近 30 天分类统计折线图，观察日志密度变化。</p>
                </div>
                <div class="rounded-full border border-blue-100 bg-blue-50 px-3 py-1.5 text-xs font-semibold uppercase tracking-[0.18em] text-blue-700" x-text="logTrendRangeLabel()"></div>
              </div>

              <template x-if="hasLogTrendData()">
                <div x-ref="logsTrendChart" class="mt-4 h-80 overflow-hidden rounded-[1.125rem] border border-slate-800/70 bg-slate-950 shadow-[inset_0_1px_0_rgba(255,255,255,0.04)]"></div>
              </template>

              <div x-show="!hasLogTrendData()" class="mt-4 grid h-80 place-items-center rounded-[1.125rem] border border-dashed border-slate-200 bg-slate-50/70 px-6 text-center">
                <div>
                  <div class="text-sm font-semibold text-slate-700">近 30 天暂无分类波动</div>
                  <p class="mt-2 text-sm leading-6 text-slate-500">保留分类汇总，后续产生新日志后会自动恢复折线图。</p>
                </div>
              </div>

              <div class="mt-4 grid gap-3 sm:grid-cols-2">
                <template x-for="item in logCategoryCards()" :key="item.key">
                  <div class="admin-subsurface rounded-2xl border border-blue-100 bg-blue-50/60 p-4">
                    <div class="flex items-start justify-between gap-3">
                      <div class="min-w-0">
                        <div class="flex items-center gap-2">
                          <span class="h-2.5 w-2.5 rounded-full" :style="'background-color:' + item.color"></span>
                          <div class="text-sm font-semibold text-slate-900" x-text="item.label"></div>
                        </div>
                        <p class="mt-2 text-xs leading-5 text-slate-500" x-text="item.hint"></p>
                      </div>
                      <div class="text-2xl font-semibold tabular-nums text-slate-900" x-text="item.count"></div>
                    </div>
                  </div>
                </template>
              </div>
            </section>
          </div>
