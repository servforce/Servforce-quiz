<div x-show="route.name === 'quizzes'" class="space-y-4">
            <div class="admin-mobile-pane-grid grid gap-4 xl:grid-cols-[1.2fr_0.8fr]">
              <div
                x-show="shouldShowAdminCompactTabs('quizzes')"
                x-cloak
                data-admin-compact-tabs="quizzes"
                class="hidden admin-compact-tabs md:block xl:hidden"
              >
                <div class="admin-compact-tabs__track" role="tablist" aria-label="测验页面内容切换">
                  <template x-for="tab in adminCompactTabs('quizzes')" :key="tab.id">
                    <button
                      type="button"
                      role="tab"
                      @click="setAdminCompactTab('quizzes', tab.id)"
                      :class="adminCompactTab('quizzes') === tab.id ? 'admin-compact-tab--active' : 'admin-compact-tab--inactive'"
                      :aria-selected="String(adminCompactTab('quizzes') === tab.id)"
                      class="admin-compact-tab"
                      x-text="tab.label"
                    ></button>
                  </template>
                </div>
              </div>

              <section
                x-show="adminCompactPanelVisible('quizzes', 'list')"
                class="admin-surface rounded-3xl border border-white/70 bg-white/82 p-5 shadow-[var(--admin-shadow)] backdrop-blur-xl"
              >
                <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                  <div>
                    <h2 class="text-xl font-semibold tracking-[-0.03em] text-slate-900">测验列表</h2>
                    <p class="mt-1 text-sm text-slate-600">只保留 Git 仓库同步</p>
                  </div>
                  <div x-data="{ composing: false }" class="min-w-0 w-full lg:w-[20rem]">
                    <input
                      x-model="filters.quizzes.q"
                      @change="loadQuizzes"
                      @compositionstart="composing = true"
                      @compositionend="composing = false"
                      @keydown.enter.prevent="if (!composing) $event.target.blur()"
                      class="min-w-0 w-full rounded-lg border border-blue-100 bg-white px-4 py-2.5 text-sm outline-none focus:border-blue-300"
                      placeholder="搜索标题 / ID / tags"
                    />
                  </div>
                </div>
                <div class="mt-5 grid gap-3">
                  <template x-for="item in quizzes.items" :key="item.quiz_key">
                    <button
                      type="button"
                      @click="go('/admin/quizzes/' + item.quiz_key)"
                      class="admin-subsurface grid gap-3 rounded-lg border border-blue-100/80 bg-white p-4 text-left transition hover:-translate-y-0.5 hover:border-blue-300 hover:bg-blue-50/50 md:grid-cols-[1fr_auto]"
                    >
                      <div class="min-w-0">
                        <div class="flex flex-wrap items-center gap-2">
                          <h3 class="truncate text-lg font-semibold text-slate-900" x-text="item.title || item.quiz_key"></h3>
                          <span class="rounded-full border border-blue-100 bg-blue-50 px-2.5 py-1 text-[11px] font-semibold text-blue-700" x-text="item.quiz_key"></span>
                        </div>
                        <div class="mt-3 flex flex-wrap gap-2 text-xs text-slate-600">
                          <span class="rounded-full bg-slate-100 px-2.5 py-1">题目数 <strong x-text="item.question_count"></strong></span>
                          <span class="rounded-full bg-slate-100 px-2.5 py-1">预计 <strong x-text="item.estimated_duration_minutes || 0"></strong> 分钟</span>
                          <span class="rounded-full bg-slate-100 px-2.5 py-1">版本 <strong x-text="item.current_version_no || '-'"></strong></span>
                          <span class="rounded-full bg-slate-100 px-2.5 py-1">状态 <strong x-text="item.status"></strong></span>
                        </div>
                        <div x-show="(item.tags || []).length" class="mt-3 text-xs text-slate-500" x-text="(item.tags || []).join(' · ')"></div>
                      </div>
                      <div class="flex items-center gap-2 text-xs text-slate-500">
                        <span x-show="item.public_invite_enabled" class="rounded-full border border-emerald-100 bg-emerald-50 px-2.5 py-1 text-emerald-700">公开邀约</span>
                        <span class="material-symbols-rounded text-slate-400">arrow_outward</span>
                      </div>
                    </button>
                  </template>
                </div>
              </section>

              <section
                x-show="adminCompactPanelVisible('quizzes', 'repo')"
                class="admin-surface rounded-3xl border border-white/70 bg-white/82 p-5 shadow-[var(--admin-shadow)] backdrop-blur-xl"
              >
                <h2 class="text-xl font-semibold tracking-[-0.03em] text-slate-900">绑定仓库</h2>
                <p class="mt-1 text-sm text-slate-600">每套实例只绑定一个 Git 仓库；首次绑定后自动同步，后续同步仅针对当前绑定仓库执行。</p>

                <div x-show="!hasRepoBinding()" class="mt-5">
                  <label class="block">
                    <span class="mb-2 block text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">仓库地址</span>
                    <div class="flex items-center gap-0 overflow-hidden rounded-lg border border-blue-100 bg-white">
                      <input
                        x-model="syncForm.repoUrl"
                        :readonly="isSyncBusy()"
                        :aria-readonly="isSyncBusy() ? 'true' : 'false'"
                        class="min-w-0 flex-1 bg-transparent px-4 py-3 text-sm outline-none"
                        :style="isSyncBusy() ? 'color:#64748b;' : ''"
                        placeholder="https://example.com/repo.git"
                      />
                      <button
                        @click="bindRepo"
                        type="button"
                        :disabled="isSyncBusy()"
                        class="inline-flex shrink-0 items-center gap-2 bg-slate-900 px-4 py-3 text-sm font-medium text-white transition hover:bg-slate-800"
                        :style="isSyncBusy() ? 'opacity:0.72; cursor:not-allowed; border-top-right-radius: 0.5rem; border-bottom-right-radius: 0.5rem;' : 'border-top-right-radius: 0.5rem; border-bottom-right-radius: 0.5rem;'"
                      >
                        <span class="material-symbols-rounded text-base">link</span>
                        <span>绑定并同步</span>
                      </button>
                    </div>
                  </label>
                </div>

                <div x-show="hasRepoBinding()" class="mt-5 space-y-4">
                  <div>
                    <div class="mb-2 block text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">当前绑定仓库</div>
                    <div class="flex items-center gap-0 overflow-hidden rounded-lg border border-blue-100 bg-white">
                      <input
                        :value="repoBinding.repo_url || ''"
                        readonly
                        aria-readonly="true"
                        class="min-w-0 flex-1 bg-transparent px-4 py-3 text-sm text-slate-700 outline-none"
                      />
                      <button
                        @click="syncQuizzes"
                        type="button"
                        :disabled="isSyncBusy()"
                        class="inline-flex shrink-0 items-center gap-2 bg-slate-900 px-4 py-3 text-sm font-medium text-white transition hover:bg-slate-800"
                        :style="isSyncBusy() ? 'opacity:0.72; cursor:not-allowed; border-top-right-radius: 0.5rem; border-bottom-right-radius: 0.5rem;' : 'border-top-right-radius: 0.5rem; border-bottom-right-radius: 0.5rem;'"
                      >
                        <span class="material-symbols-rounded text-base" x-text="isSyncBusy() ? 'progress_activity' : 'sync'"></span>
                        <span x-text="isSyncBusy() ? '同步中' : '立即同步'"></span>
                      </button>
                    </div>
                    <div class="mt-2 text-xs text-slate-500" x-show="repoBinding.bound_at">
                      绑定时间：<span x-text="formatDateTime(repoBinding.bound_at)"></span>
                    </div>
                  </div>

                  <div class="rounded-2xl border border-rose-100 bg-rose-50/70 p-4">
                    <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                      <div>
                        <div class="text-sm font-semibold text-rose-700">重新绑定仓库</div>
                        <p class="mt-1 text-xs leading-6 text-rose-600">重新绑定会删除当前实例中的测验、版本、邀约与答题归档数据，但会保留候选人与简历。</p>
                      </div>
                      <button
                        x-show="!rebindForm.open"
                        @click="openRebindForm"
                        type="button"
                        :disabled="isSyncBusy()"
                        class="inline-flex items-center gap-2 rounded-lg border border-rose-200 bg-white px-4 py-2.5 text-sm font-medium text-rose-700 transition hover:bg-rose-100"
                        :style="isSyncBusy() ? 'opacity:0.72; cursor:not-allowed;' : ''"
                      >
                        <span class="material-symbols-rounded text-base">warning</span>
                        <span>重新绑定</span>
                      </button>
                    </div>

                    <div x-show="rebindForm.open" class="mt-4 space-y-3">
                      <label class="block">
                        <span class="mb-2 block text-xs font-semibold uppercase tracking-[0.18em] text-rose-500">新仓库地址</span>
                        <input
                          x-model="rebindForm.repoUrl"
                          :readonly="isSyncBusy()"
                          class="w-full rounded-lg border border-rose-200 bg-white px-4 py-3 text-sm outline-none"
                          placeholder="https://example.com/repo.git"
                        />
                      </label>
                      <label class="block">
                        <span class="mb-2 block text-xs font-semibold uppercase tracking-[0.18em] text-rose-500">确认词</span>
                        <input
                          x-model="rebindForm.confirmationText"
                          :readonly="isSyncBusy()"
                          class="w-full rounded-lg border border-rose-200 bg-white px-4 py-3 text-sm outline-none"
                          placeholder="请输入：重新绑定"
                        />
                      </label>
                      <div class="rounded-2xl border border-rose-100 bg-white/80 px-4 py-3 text-xs leading-6 text-rose-600">
                        删除范围：测验、版本、邀约、答题结果与归档。
                        <br />
                        保留范围：候选人、简历、系统日志与运行时配置。
                      </div>
                      <div class="flex flex-wrap gap-2">
                        <button
                          @click="confirmRebind"
                          type="button"
                          :disabled="isSyncBusy() || rebindForm.confirmationText !== '重新绑定'"
                          class="inline-flex items-center gap-2 rounded-lg bg-rose-600 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-rose-700"
                          :style="(isSyncBusy() || rebindForm.confirmationText !== '重新绑定') ? 'opacity:0.72; cursor:not-allowed;' : ''"
                        >
                          <span class="material-symbols-rounded text-base">delete_forever</span>
                          <span>确认重新绑定并删除现有测验数据</span>
                        </button>
                        <button
                          @click="closeRebindForm"
                          type="button"
                          :disabled="isSyncBusy()"
                          class="inline-flex items-center gap-2 rounded-lg border border-rose-200 bg-white px-4 py-2.5 text-sm font-medium text-rose-700 transition hover:bg-rose-100"
                          :style="isSyncBusy() ? 'opacity:0.72; cursor:not-allowed;' : ''"
                        >
                          <span class="material-symbols-rounded text-base">close</span>
                          <span>取消</span>
                        </button>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="mt-6 rounded-2xl border border-blue-100 bg-blue-50/70 p-4 text-sm text-slate-700">
                  <div class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">当前状态</div>
                  <pre class="mt-3 overflow-auto whitespace-pre-wrap text-xs leading-6 text-slate-700" x-text="pretty(syncState)"></pre>
                </div>
              </section>
            </div>
          </div>
