<div x-show="route.name === 'status'" class="admin-mobile-pane-grid grid gap-4 xl:grid-cols-[1.05fr_0.95fr]">
            <div
              x-show="shouldShowAdminCompactTabs('status')"
              x-cloak
              data-admin-compact-tabs="status"
              class="hidden admin-compact-tabs md:block xl:hidden"
            >
              <div class="admin-compact-tabs__track" role="tablist" aria-label="系统状态内容切换">
                <template x-for="tab in adminCompactTabs('status')" :key="tab.id">
                  <button
                    type="button"
                    role="tab"
                    @click="setAdminCompactTab('status', tab.id)"
                    :class="adminCompactTab('status') === tab.id ? 'admin-compact-tab--active' : 'admin-compact-tab--inactive'"
                    :aria-selected="String(adminCompactTab('status') === tab.id)"
                    class="admin-compact-tab"
                    x-text="tab.label"
                  ></button>
                </template>
              </div>
            </div>

            <section
              x-show="adminCompactPanelVisible('status', 'summary')"
              class="admin-surface rounded-3xl border border-white/70 bg-white/82 p-5 shadow-[var(--admin-shadow)] backdrop-blur-xl"
            >
              <div class="flex flex-wrap items-start justify-between gap-3">
                <div>
                  <h2 class="text-xl font-semibold tracking-[-0.03em] text-slate-900">系统状态摘要</h2>
                  <p class="mt-1 text-sm text-slate-600">恢复每日统计表，按天查看新增测验、邀约、候选人与资源消耗。</p>
                </div>
                <div class="rounded-full border border-blue-100 bg-blue-50 px-3 py-1.5 text-xs font-semibold uppercase tracking-[0.18em] text-blue-700" x-text="statusRangeLabel()"></div>
              </div>
              <div x-show="statusConfigAlerts().length" class="mt-5 rounded-2xl border border-rose-200 bg-rose-50/85 p-4 text-sm text-rose-900">
                <div class="text-xs font-semibold uppercase tracking-[0.18em] text-rose-700">配置提醒</div>
                <div class="mt-3 space-y-2">
                  <template x-for="alert in statusConfigAlerts()" :key="alert.key">
                    <div class="rounded-2xl border border-rose-100 bg-white/75 px-3 py-2.5">
                      <div class="font-semibold text-rose-800" x-text="alert.label"></div>
                      <div class="mt-1 text-xs leading-5 text-rose-700" x-text="alert.message"></div>
                    </div>
                  </template>
                </div>
              </div>
              <div class="mt-5 grid gap-4 sm:grid-cols-2">
                <div class="admin-subsurface rounded-2xl border border-blue-100 bg-blue-50/70 p-4">
                  <div class="flex items-start justify-between gap-3">
                    <div class="text-xs uppercase tracking-[0.18em] text-slate-500">LLM</div>
                    <div x-show="!statusModuleConfigured('llm')" class="rounded-full border border-rose-200 bg-rose-50 px-2.5 py-1 text-[11px] font-semibold text-rose-700">未配置</div>
                  </div>
                  <div class="mt-3 text-3xl font-semibold text-slate-900" x-text="statusSummary.llm?.used || 0"></div>
                  <div class="mt-1 text-sm text-slate-600" x-text="'阈值 ' + (statusSummary.llm?.limit || 0)"></div>
                  <div x-show="!statusModuleConfigured('llm')" class="mt-3 rounded-2xl border border-rose-100 bg-white/75 px-3 py-2 text-xs leading-5 text-rose-700" x-text="statusModuleMissingText('llm')"></div>
                </div>
                <div class="admin-subsurface rounded-2xl border border-blue-100 bg-blue-50/70 p-4">
                  <div class="flex items-start justify-between gap-3">
                    <div class="text-xs uppercase tracking-[0.18em] text-slate-500">短信</div>
                    <div x-show="!statusModuleConfigured('sms')" class="rounded-full border border-rose-200 bg-rose-50 px-2.5 py-1 text-[11px] font-semibold text-rose-700">未配置</div>
                  </div>
                  <div class="mt-3 text-3xl font-semibold text-slate-900" x-text="statusSummary.sms?.used || 0"></div>
                  <div class="mt-1 text-sm text-slate-600" x-text="'阈值 ' + (statusSummary.sms?.limit || 0)"></div>
                  <div x-show="!statusModuleConfigured('sms')" class="mt-3 rounded-2xl border border-rose-100 bg-white/75 px-3 py-2 text-xs leading-5 text-rose-700" x-text="statusModuleMissingText('sms')"></div>
                </div>
              </div>

              <div class="mt-4 flex items-center gap-2 text-[11px] font-medium text-slate-500 md:hidden">
                <span class="material-symbols-rounded text-sm text-slate-400">swap_horiz</span>
                <span>左右滑动查看完整数据</span>
              </div>

              <div class="admin-subsurface admin-data-table mt-5 overflow-hidden rounded-[1.125rem] border border-slate-200 bg-white">
                <div class="admin-data-table__scroller">
                  <div class="admin-data-table__content">
                    <div class="admin-data-table__grid grid grid-cols-[1.2fr_repeat(5,minmax(88px,1fr))] gap-3 border-b border-slate-200 bg-slate-50 px-4 py-3 text-[11px] font-semibold uppercase tracking-[0.18em] text-slate-500">
                      <div>日期</div>
                      <div class="text-right">测验新增</div>
                      <div class="text-right">邀约新增</div>
                      <div class="text-right">候选人新增</div>
                      <div class="text-right">LLM tokens</div>
                      <div class="text-right">短信调用</div>
                    </div>
                    <div class="admin-data-table__body max-h-[520px]">
                      <template x-for="item in statusDailyRows()" :key="item.day">
                        <div class="admin-data-table__grid grid grid-cols-[1.2fr_repeat(5,minmax(88px,1fr))] gap-3 border-b border-slate-100 px-4 py-3 text-sm text-slate-700 last:border-b-0 hover:bg-blue-50/35">
                          <div class="font-mono text-xs text-slate-500" x-text="item.day"></div>
                          <div class="text-right tabular-nums text-slate-900" x-text="formatNumber(item.quizzes_new)"></div>
                          <div class="text-right tabular-nums text-slate-900" x-text="formatNumber(item.invites_new)"></div>
                          <div class="text-right tabular-nums text-slate-900" x-text="formatNumber(item.candidates_new)"></div>
                          <div class="text-right tabular-nums text-slate-900" x-text="formatNumber(item.llm_tokens)"></div>
                          <div class="text-right tabular-nums text-slate-900" x-text="formatNumber(item.sms_calls)"></div>
                        </div>
                      </template>
                      <div class="admin-data-table__grid sticky bottom-0 grid grid-cols-[1.2fr_repeat(5,minmax(88px,1fr))] gap-3 border-t border-slate-200 bg-blue-50/95 px-4 py-3 text-sm text-slate-700 backdrop-blur-sm">
                        <div class="font-semibold text-slate-900">区间合计</div>
                        <div class="text-right tabular-nums text-slate-900" x-text="formatNumber(statusDailyTotals().quizzes_new)"></div>
                        <div class="text-right tabular-nums text-slate-900" x-text="formatNumber(statusDailyTotals().invites_new)"></div>
                        <div class="text-right tabular-nums text-slate-900" x-text="formatNumber(statusDailyTotals().candidates_new)"></div>
                        <div class="text-right tabular-nums text-slate-900" x-text="formatNumber(statusDailyTotals().llm_tokens)"></div>
                        <div class="text-right tabular-nums text-slate-900" x-text="formatNumber(statusDailyTotals().sms_calls)"></div>
                  </div>
                </div>

              </div>
            </div>
          </div>
            </section>
            <section
              x-show="adminCompactPanelVisible('status', 'config')"
              class="admin-surface rounded-3xl border border-white/70 bg-white/82 p-5 shadow-[var(--admin-shadow)] backdrop-blur-xl"
            >
              <h2 class="text-xl font-semibold tracking-[-0.03em] text-slate-900">阈值配置</h2>
              <div class="mt-4 space-y-4">
                <div class="grid gap-3 lg:grid-cols-2">
                  <div class="admin-subsurface rounded-2xl border border-blue-100 bg-blue-50/70 p-4">
                    <div class="flex items-start justify-between gap-3">
                      <div class="min-w-0">
                        <div class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">当前接入 LLM</div>
                        <div class="mt-2 text-sm font-semibold text-slate-900" x-text="statusSummary.llm?.integration?.title || 'OpenAI 兼容 Responses API'"></div>
                        <div class="mt-2 text-sm leading-6 text-slate-600" x-text="statusSummary.llm?.integration?.summary || '模型未设置 · 接口未设置'"></div>
                      </div>
                      <div x-show="!statusModuleConfigured('llm')" class="shrink-0 rounded-full border border-rose-200 bg-rose-50 px-2.5 py-1 text-[11px] font-semibold text-rose-700">未配置</div>
                    </div>
                  </div>
                  <div class="admin-subsurface rounded-2xl border border-blue-100 bg-blue-50/70 p-4">
                    <div class="flex items-start justify-between gap-3">
                      <div class="min-w-0">
                        <div class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">短信认证摘要</div>
                        <div class="mt-2 text-sm font-semibold text-slate-900" x-text="statusSummary.sms?.integration?.title || '阿里云 PNVS 短信认证'"></div>
                        <div class="mt-2 text-sm leading-6 text-slate-600" x-text="statusSummary.sms?.integration?.summary || '签名未设置 · 模板未设置 · 接口未设置'"></div>
                      </div>
                      <div x-show="!statusModuleConfigured('sms')" class="shrink-0 rounded-full border border-rose-200 bg-rose-50 px-2.5 py-1 text-[11px] font-semibold text-rose-700">未配置</div>
                    </div>
                  </div>
                </div>
                <label class="block">
                  <span class="mb-2 block text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">LLM token 日阈值</span>
                  <input x-model="statusConfig.llm_tokens_limit" class="w-full rounded-lg border border-blue-100 bg-white px-4 py-3 text-sm outline-none focus:border-blue-300" />
                </label>
                <label class="block">
                  <span class="mb-2 block text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">短信调用日阈值</span>
                  <input x-model="statusConfig.sms_calls_limit" class="w-full rounded-lg border border-blue-100 bg-white px-4 py-3 text-sm outline-none focus:border-blue-300" />
                </label>
                <button @click="saveStatusConfig" type="button" class="rounded-lg bg-blue-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-blue-700">保存阈值</button>
              </div>
            </section>
          </div>
