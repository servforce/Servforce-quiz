<div x-show="route.name === 'quiz-analytics'" class="space-y-4">
  <div class="admin-mobile-pane-grid grid gap-4 xl:h-[calc(100vh-8.5rem)] xl:grid-cols-[minmax(15rem,0.58fr)_minmax(0,1.42fr)]">
    <div
      x-show="shouldShowAdminCompactTabs('quiz-analytics')"
      x-cloak
      data-admin-compact-tabs="quiz-analytics"
      class="hidden admin-compact-tabs md:block xl:hidden"
    >
      <div class="admin-compact-tabs__track" role="tablist" aria-label="测验分析内容切换">
        <template x-for="tab in adminCompactTabs('quiz-analytics')" :key="tab.id">
          <button
            type="button"
            role="tab"
            @click="setAdminCompactTab('quiz-analytics', tab.id)"
            :class="adminCompactTab('quiz-analytics') === tab.id ? 'admin-compact-tab--active' : 'admin-compact-tab--inactive'"
            :aria-selected="String(adminCompactTab('quiz-analytics') === tab.id)"
            class="admin-compact-tab"
            x-text="tab.label"
          ></button>
        </template>
      </div>
    </div>

    <section
      x-show="adminCompactPanelVisible('quiz-analytics', 'list')"
      class="admin-surface overflow-hidden rounded-3xl border border-white/70 bg-white/82 p-5 shadow-[var(--admin-shadow)] backdrop-blur-xl xl:flex xl:h-full xl:min-h-0 xl:flex-col xl:rounded-b-none xl:border-b-0"
    >
      <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
        <div>
          <h2 class="text-xl font-semibold tracking-[-0.03em] text-slate-900">测验列表</h2>
          <p class="mt-1 text-sm text-slate-600">按测验查看一段时间内的答题数量、得分分布和清单。</p>
        </div>
        <div x-data="{ composing: false }" class="min-w-0 w-full lg:w-[20rem]">
          <input
            x-model="filters.quizAnalytics.q"
            @input="scheduleQuizAnalyticsReloadFromFirstPage"
            @compositionstart="composing = true"
            @compositionend="composing = false"
            @keydown.enter.prevent="if (!composing) $event.target.blur()"
            class="min-w-0 w-full rounded-lg border border-blue-100 bg-white px-4 py-2.5 text-sm outline-none focus:border-blue-300"
            placeholder="搜索标题 / quiz_key / tags"
          />
        </div>
      </div>

      <div class="mt-5 xl:flex xl:min-h-0 xl:flex-1 xl:flex-col">
        <div class="grid gap-2 xl:min-h-0 xl:flex-1 xl:overflow-auto xl:pr-2">
          <template x-for="item in quizAnalytics.items || []" :key="item.quiz_key">
            <button
              type="button"
              @click="selectQuizAnalyticsItem(item)"
              :class="currentQuizAnalyticsKey() === String(item.quiz_key || '').trim() ? 'border-blue-300 bg-blue-50/55' : 'border-blue-100/80 bg-white hover:border-blue-300 hover:bg-blue-50/35'"
              class="admin-subsurface grid gap-2 rounded-2xl border p-3 text-left transition"
            >
              <div class="min-w-0">
                <div>
                  <h3
                    class="text-lg font-semibold leading-7 text-slate-900 break-words"
                    x-text="(item.title || item.quiz_key) + ((Number(item.question_count || 0) > 0) ? ('（' + Number(item.question_count || 0) + '题）') : '')"
                  ></h3>
                </div>
                <div x-show="(item.tags || []).length" class="mt-1 text-xs leading-5 text-slate-500" x-text="(item.tags || []).join(' · ')"></div>
              </div>
            </button>
          </template>

          <div
            x-show="!(quizAnalytics.items || []).length"
            class="rounded-2xl border border-dashed border-slate-200 bg-slate-50/75 px-4 py-10 text-center text-sm text-slate-500"
          >
            当前没有匹配的测验
          </div>
        </div>

        <div
          x-show="quizAnalyticsHasPagination()"
          class="mt-5 flex flex-col gap-3 rounded-2xl border border-slate-200 bg-slate-50/70 px-4 py-3 sm:flex-row sm:items-center sm:justify-between"
        >
          <div class="text-sm text-slate-600 tabular-nums" x-text="'共 ' + (quizAnalytics.total || 0) + ' 条 / 第 ' + (quizAnalytics.page || 1) + ' 页，共 ' + (quizAnalytics.total_pages || 1) + ' 页'"></div>
          <div class="flex flex-wrap items-center gap-2">
            <button
              @click="changeQuizAnalyticsPage((quizAnalytics.page || 1) - 1)"
              type="button"
              :disabled="!canGoToPreviousQuizAnalyticsPage()"
              :class="quizAnalyticsPaginationButtonClass(!canGoToPreviousQuizAnalyticsPage())"
            >上一页</button>
            <button
              @click="changeQuizAnalyticsPage((quizAnalytics.page || 1) + 1)"
              type="button"
              :disabled="!canGoToNextQuizAnalyticsPage()"
              :class="quizAnalyticsPaginationButtonClass(!canGoToNextQuizAnalyticsPage())"
            >下一页</button>
          </div>
        </div>
      </div>
    </section>

    <section
      x-show="adminCompactPanelVisible('quiz-analytics', 'detail')"
      class="admin-surface overflow-hidden rounded-3xl border border-white/70 bg-white/82 p-5 shadow-[var(--admin-shadow)] backdrop-blur-xl xl:flex xl:h-full xl:min-h-0 xl:flex-col xl:rounded-b-none xl:border-b-0"
    >
      <div x-show="quizAnalyticsDetail.quiz?.quiz_key" class="space-y-5 xl:min-h-0 xl:flex-1 xl:overflow-auto xl:pr-2">
          <div class="flex flex-col gap-4 xl:flex-row xl:items-start xl:justify-between">
            <div class="min-w-0">
              <div class="flex flex-wrap items-center gap-2">
                <h2 class="truncate text-xl font-semibold tracking-[-0.03em] text-slate-900" x-text="quizAnalyticsDetail.quiz?.title || quizAnalyticsDetail.quiz?.quiz_key"></h2>
                <span class="rounded-full border border-blue-100 bg-blue-50 px-2.5 py-1 text-[11px] font-semibold text-blue-700" x-text="quizAnalyticsDetail.quiz?.quiz_key"></span>
              </div>
              <div class="mt-2 text-sm text-slate-600" x-text="(quizAnalyticsDetail.filters?.window_label || '') + ' · ' + (quizAnalyticsDetail.filters?.version_scope_label || '')"></div>
              <div x-show="(quizAnalyticsDetail.quiz?.tags || []).length" class="mt-3 flex flex-wrap gap-2">
                <template x-for="tag in (quizAnalyticsDetail.quiz?.tags || [])" :key="tag">
                  <span class="rounded-full border border-slate-200 bg-slate-50 px-2.5 py-1 text-[11px] font-medium text-slate-600" x-text="tag"></span>
                </template>
              </div>
            </div>

          <div class="flex flex-col gap-3 xl:items-start">
            <div class="flex flex-wrap items-center gap-2">
              <div class="flex flex-wrap items-center gap-2">
                <input
                  x-model="filters.quizAnalytics.start_date"
                  @keydown.enter.prevent="applyQuizAnalyticsCustomDateRange()"
                  type="date"
                  class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-xs font-medium text-slate-700 outline-none transition focus:border-blue-300"
                />
                <span class="text-xs text-slate-400">至</span>
                <input
                  x-model="filters.quizAnalytics.end_date"
                  @keydown.enter.prevent="applyQuizAnalyticsCustomDateRange()"
                  type="date"
                  class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-xs font-medium text-slate-700 outline-none transition focus:border-blue-300"
                />
                <button
                  type="button"
                  @click="applyQuizAnalyticsCustomDateRange()"
                  :disabled="!quizAnalyticsCanApplyCustomDateRange()"
                  :class="quizAnalyticsCanApplyCustomDateRange() ? 'border-blue-200 bg-blue-50 text-blue-700 hover:border-blue-300' : 'border-slate-200 bg-white text-slate-300'"
                  class="rounded-full border px-3 py-1.5 text-xs font-semibold transition disabled:cursor-not-allowed"
                >查询</button>
              </div>

              <template x-for="option in quizAnalyticsWindowOptions()" :key="option.key">
                <button
                  type="button"
                  @click="changeQuizAnalyticsWindow(option.key)"
                  :class="currentQuizAnalyticsWindow() === option.key ? 'border-blue-200 bg-blue-50 text-blue-700' : 'border-slate-200 bg-white text-slate-600 hover:border-blue-200 hover:text-blue-700'"
                  class="rounded-full border px-3 py-1.5 text-xs font-semibold transition"
                  x-text="option.label"
                ></button>
              </template>
            </div>

            <div class="flex flex-wrap items-center gap-2">
              <template x-for="option in quizAnalyticsVersionScopeOptions()" :key="option.key">
                <button
                  type="button"
                  @click="changeQuizAnalyticsVersionScope(option.key)"
                  :disabled="option.key === 'current' && !quizAnalyticsDetail.quiz?.supports_version_scope_switch"
                  :class="currentQuizAnalyticsVersionScope() === option.key ? 'border-emerald-200 bg-emerald-50 text-emerald-700' : 'border-slate-200 bg-white text-slate-600 hover:border-emerald-200 hover:text-emerald-700'"
                  class="rounded-full border px-3 py-1.5 text-xs font-semibold transition disabled:cursor-not-allowed disabled:opacity-45"
                  x-text="option.label"
                ></button>
              </template>

              <label
                x-show="shouldShowQuizAnalyticsVersionSelect()"
                class="ml-1 flex items-center gap-2 text-xs font-medium text-slate-500"
              >
                <span>版本号</span>
                <select
                  :value="String(quizAnalyticsDetail.filters?.version_id || '')"
                  @change="changeQuizAnalyticsVersionId($event.target.value)"
                  class="rounded-lg border border-emerald-200 bg-white px-3 py-2 text-xs font-semibold text-slate-700 outline-none transition focus:border-emerald-300"
                >
                  <template x-for="version in quizAnalyticsAvailableVersions()" :key="version.id">
                    <option :value="String(version.id)" x-text="'V' + (version.version_no || '-')"></option>
                  </template>
                </select>
              </label>
            </div>
          </div>
        </div>

        <div class="grid gap-3 sm:grid-cols-2 xl:grid-cols-5">
          <template x-for="card in quizAnalyticsSummaryCards()" :key="card.key">
            <article :class="quizAnalyticsCardClass(card.tone)" class="rounded-2xl border px-4 py-4">
              <div class="text-[11px] font-semibold uppercase tracking-[0.18em] text-slate-500" x-text="card.label"></div>
              <div class="mt-3 text-3xl font-semibold tracking-[-0.04em] text-slate-900 tabular-nums" x-text="card.value"></div>
            </article>
          </template>
        </div>

        <div class="space-y-3">
          <div>
            <h3 class="text-lg font-semibold tracking-[-0.03em] text-slate-900">得分分布</h3>
            <p class="mt-1 text-sm text-slate-600">按 10 分分段统计展示；若满分不同，会拆成多个分布组。</p>
          </div>

          <div x-show="quizAnalyticsHasDistribution()" class="grid gap-3">
            <template x-for="group in quizAnalyticsDistributionGroups()" :key="group.score_max_label">
              <article class="overflow-hidden rounded-2xl border border-slate-200 bg-slate-50/70">
                <div class="border-b border-slate-200 px-4 py-3">
                  <div class="flex flex-wrap items-center justify-between gap-2">
                    <div class="text-sm font-semibold text-slate-900" x-text="group.score_max_label"></div>
                    <div class="text-xs font-medium text-slate-500">
                      共 <span class="tabular-nums" x-text="group.total_count || 0"></span> 份已评分答卷
                    </div>
                  </div>
                </div>
                <div class="overflow-x-auto px-4 py-4">
                  <div :class="quizAnalyticsDistributionColumnsClass()">
                  <template x-for="row in quizAnalyticsDistributionRows(group)" :key="row.key">
                    <div>
                      <button
                        type="button"
                        x-show="row.kind === 'bucket'"
                        @click="toggleQuizAnalyticsScoreFilter(group, row)"
                        :class="quizAnalyticsDistributionColumnButtonClass(group, row)"
                      >
                        <div class="text-[11px] font-semibold tabular-nums text-slate-700" x-text="row.count || 0"></div>
                        <div :class="quizAnalyticsDistributionColumnTrackClass(group, row)">
                          <div class="w-full rounded-lg bg-linear-to-t from-blue-500 via-sky-500 to-emerald-500" :style="quizAnalyticsDistributionColumnStyle(group, row)"></div>
                        </div>
                        <div class="text-center text-[11px] font-mono leading-4 text-slate-500" x-text="row.label"></div>
                      </button>
                      <div
                        x-show="row.kind === 'gap'"
                        :class="quizAnalyticsDistributionGapClass()"
                      >
                        <div class="text-[11px] font-medium tracking-[0.28em] text-slate-300">...</div>
                        <div class="h-40 w-px border-l border-dashed border-slate-300"></div>
                        <div class="text-[11px] font-medium tracking-[0.28em] text-slate-300" x-text="row.label"></div>
                      </div>
                    </div>
                  </template>
                  </div>
                </div>
              </article>
            </template>
          </div>

          <div
            x-show="!quizAnalyticsHasDistribution()"
            class="rounded-2xl border border-dashed border-slate-200 bg-slate-50/75 px-6 py-10 text-center"
          >
            <div class="text-sm font-semibold text-slate-700">当前窗口内暂无可计分完成记录</div>
            <p class="mt-2 text-sm leading-6 text-slate-500">Traits-only 答卷会进入数量和清单，但不会参与原始分数分布。</p>
          </div>
        </div>

        <div class="space-y-3">
          <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
            <div>
              <h3 class="text-lg font-semibold tracking-[-0.03em] text-slate-900">答题清单</h3>
              <p class="mt-1 text-sm text-slate-600">展示该测验在当前时间窗口内的进行中与已完成记录。</p>
              <div x-show="quizAnalyticsHasActiveScoreFilter()" class="mt-2 flex flex-wrap items-center gap-2">
                <span class="rounded-full border border-blue-200 bg-blue-50 px-3 py-1 text-xs font-semibold text-blue-700" x-text="quizAnalyticsScoreFilterLabel()"></span>
                <button
                  type="button"
                  @click="clearQuizAnalyticsScoreFilter()"
                  class="text-xs font-medium text-slate-500 transition hover:text-blue-700"
                >清除筛选</button>
              </div>
            </div>
            <div class="flex flex-wrap items-center gap-2">
              <span class="text-xs font-medium text-slate-500">排序</span>
              <template x-for="option in quizAnalyticsListSortOptions()" :key="option.key">
                <button
                  type="button"
                  @click="changeQuizAnalyticsListSort(option.key)"
                  :class="quizAnalyticsListSortButtonClass(option.key)"
                >
                  <span x-text="option.label"></span>
                  <span class="ml-1" x-text="quizAnalyticsListSortDirectionLabel(option.key)"></span>
                </button>
              </template>
            </div>
          </div>

          <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white">
            <div class="overflow-auto">
              <table class="min-w-full table-fixed divide-y divide-slate-200 text-sm">
                <colgroup>
                  <col class="w-[24%]" />
                  <col class="w-[8%]" />
                  <col class="w-[10%]" />
                  <col class="w-[10%]" />
                  <col class="w-[15%]" />
                  <col class="w-[15%]" />
                  <col class="w-[10%]" />
                  <col class="w-[8%]" />
                </colgroup>
                <thead class="bg-slate-50/90">
                  <tr class="text-left text-[11px] font-semibold uppercase tracking-[0.16em] text-slate-500">
                    <th class="px-4 py-3">候选人</th>
                    <th class="px-4 py-3">版本</th>
                    <th class="px-4 py-3">状态</th>
                    <th class="px-4 py-3">来源</th>
                    <th class="px-4 py-3">开始时间</th>
                    <th class="px-4 py-3">完成时间</th>
                    <th class="px-4 py-3">得分</th>
                    <th class="px-4 py-3 text-right">操作</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                  <template x-for="item in quizAnalyticsVisibleItems()" :key="item.attempt_id">
                    <tr class="align-top">
                      <td class="px-4 py-3">
                        <div class="truncate font-medium text-slate-900" :title="item.candidate_name" x-text="item.candidate_name"></div>
                        <div class="mt-1 truncate font-mono text-[11px] text-slate-400" :title="item.token" x-text="item.token"></div>
                      </td>
                      <td class="px-4 py-3 whitespace-nowrap">
                        <span class="rounded-full border border-slate-200 bg-slate-50 px-2.5 py-1 text-[11px] font-semibold text-slate-600" x-text="quizAnalyticsVersionLabel(item)"></span>
                      </td>
                      <td class="px-4 py-3 whitespace-nowrap">
                        <span :class="quizAnalyticsStatusBadgeClass(item)" x-text="item.status_label"></span>
                      </td>
                      <td class="px-4 py-3 whitespace-nowrap">
                        <span :class="quizAnalyticsSourceBadgeClass(item)" x-text="item.source_label"></span>
                      </td>
                      <td class="px-4 py-3 font-mono text-[11px] leading-5 text-slate-500" x-text="item.entered_at_display || '-'"></td>
                      <td class="px-4 py-3 font-mono text-[11px] leading-5 text-slate-500" x-text="item.finished_at_display || '-'"></td>
                      <td class="px-4 py-3 whitespace-nowrap">
                        <span class="rounded-full border border-blue-100 bg-blue-50 px-2.5 py-1 text-[11px] font-semibold text-blue-700" x-text="item.score_display || '-'"></span>
                      </td>
                      <td class="px-4 py-3 text-right whitespace-nowrap">
                        <button
                          type="button"
                          @click="go(item.detail_url)"
                          class="rounded-xl border border-blue-100 bg-white px-3 py-2 text-xs font-medium text-slate-700 transition hover:bg-blue-50 hover:text-blue-700"
                        >查看详情</button>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>

            <div
              x-show="!quizAnalyticsVisibleItemsCount()"
              class="border-t border-slate-200 px-6 py-10 text-center"
            >
              <div class="text-sm font-semibold text-slate-700" x-text="quizAnalyticsHasActiveScoreFilter() ? '当前分数筛选下没有匹配记录' : '当前窗口内没有可展示的答题记录'"></div>
              <p class="mt-2 text-sm leading-6 text-slate-500" x-text="quizAnalyticsHasActiveScoreFilter() ? '可以再次点击得分图中的分数段取消筛选，或点击“清除筛选”。' : '只统计已进入答题的进行中记录，以及已完成的归档记录。'"></p>
            </div>
          </div>
        </div>
      </div>

      <div
        x-show="!quizAnalyticsDetail.quiz?.quiz_key"
        class="rounded-2xl border border-dashed border-slate-200 bg-slate-50/75 px-6 py-16 text-center"
      >
        <div class="text-sm font-semibold text-slate-700">请选择左侧测验</div>
        <p class="mt-2 text-sm leading-6 text-slate-500">选择后会在这里展示当前时间窗口内的答题统计与清单。</p>
      </div>
    </section>
  </div>
</div>
