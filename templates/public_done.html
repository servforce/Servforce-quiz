<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>已提交</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='ui.css') }}" />
    <style>
      body { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .card { width: min(1080px, 100%); }
      .section { padding: 20px; }
      .cheer { display: grid; gap: 16px; }
      .cheer img {
        width: 100%;
        height: auto;
        max-height: 68vh;
        object-fit: contain;
        border-radius: 18px;
        border: 1px solid rgba(15, 23, 42, 0.10);
        background: rgba(255,255,255,0.94);
      }
      .thanks-title {
        margin: 0;
        font-size: 38px;
        font-weight: 950;
        letter-spacing: -0.2px;
        line-height: 1.2;
        text-align: center;
      }
      @media (max-width: 980px) {
        .card { width: min(900px, 100%); }
        .section { padding: 16px; }
        .thanks-title { font-size: 30px; }
      }
      @media (max-width: 560px) {
        .thanks-title { font-size: 24px; }
      }
    </style>
  </head>
  <body>
    <div class="surface card" role="region" aria-label="试卷已提交">
      <div class="section">
        <div class="cheer">
          <h2 class="thanks-title">考生辛苦了，我们已收到您的试卷。</h2>
          <img src="{{ url_for('static', filename='答题结束.png') }}" alt="答题结束" />
        </div>
      </div>
    </div>
  </body>
</html>
