<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>上传简历</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='ui.css') }}" />
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(560px, 100%);
      }
      .section,
      .input,
      .btn,
      input[type="file"] {
        font-size: 17px;
      }
      .hero {
        margin: 8px 0 18px;
        padding: 20px;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(15, 23, 42, 0.10);
        background: rgba(248, 250, 252, 0.75);
        position: relative;
        overflow: hidden;
      }
      .hero h1 {
        margin: 0;
        font-size: 21px;
        line-height: 1.2;
        letter-spacing: 0.2px;
      }
      .verify-overlay {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 50;
        padding: 16px 20px;
        border-radius: var(--radius-md);
        border: 1px solid rgba(220, 38, 38, 0.22);
        background: rgba(255, 255, 255, 0.92);
        color: rgba(15, 23, 42, 0.92);
        font-weight: 900;
        text-align: center;
        box-shadow: 0 16px 40px rgba(2, 6, 23, 0.12);
        display: none;
      }
      .verify-overlay.show {
        display: block;
      }
      .spinner {
        display: inline-block;
        width: 22px;
        height: 22px;
        border: 3px solid rgba(15, 23, 42, 0.22);
        border-top-color: rgba(59, 130, 246, 0.95);
        border-radius: 999px;
        animation: spin 800ms linear infinite;
        vertical-align: -2px;
        margin-right: 10px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .grid {
        display: grid;
        gap: 14px;
      }
      .row {
        display: grid;
        gap: 10px;
      }
      .label {
        font-size: 16px;
        font-weight: 900;
        color: rgba(15, 23, 42, 0.82);
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-radius: 999px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        background: rgba(255, 255, 255, 0.85);
        font-weight: 900;
        font-size: 16px;
        color: rgba(15, 23, 42, 0.9);
      }
      .pill .k {
        color: rgba(15, 23, 42, 0.58);
        font-weight: 800;
      }
      .muted {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
      }
      .actions {
        margin-top: 16px;
        display: flex;
        justify-content: center;
      }
      .actions .btn-primary {
        min-width: 180px;
        min-height: 46px;
        border-radius: var(--radius-md);
        padding: 0 28px;
      }
      input[type="file"] {
        width: 100%;
      }
      @media (max-width: 980px) {
        .card { width: min(560px, 100%); }
        .section, .input, .btn, input[type="file"] { font-size: 16px; }
        .hero h1 { font-size: 20px; }
        .label, .pill { font-size: 16px; }
        .muted { font-size: 14px; }
        .actions .btn-primary { min-width: 170px; min-height: 42px; }
      }
    </style>
  </head>
  <body>
    <div class="surface card" role="region" aria-label="上传简历">
      <div class="section">
        {% for m in get_flashed_messages() %}
        {% if m and (m|string)|trim %}
        <div class="flash error">{{ m }}</div>
        {% endif %}
        {% endfor %}

        <div class="hero" aria-label="提示">
          <h1>上传简历后开始答题</h1>
          <div class="verify-overlay" id="overlay" role="status" aria-live="polite">
            <span class="spinner" id="spinner" style="display:none;"></span>
            <span id="overlayText"></span>
          </div>
        </div>

        <div class="grid" aria-label="候选人信息">
          <div class="pill"><span class="k">姓名</span><span>{{ name }}</span></div>
          <div class="pill"><span class="k">手机号</span><span>{{ phone }}</span></div>
        </div>

        <form id="uploadForm" method="post" action="/api/public/resume/upload" enctype="multipart/form-data" class="section" style="padding:0; border:0; margin-top:16px;">
          <input type="hidden" name="token" value="{{ token }}" />
          <div class="row">
            <div class="label">简历文件</div>
            <input class="input" type="file" name="file" accept=".pdf,.docx,.png,.jpg,.jpeg,.webp,.bmp,.tif,.tiff,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,image/*" required />
            <div class="muted">支持 PDF、Word（DOCX）和图片格式。</div>
          </div>
          <div class="actions">
            <button id="submitBtn" class="btn btn-primary" type="submit">上传并继续答题</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      (function () {
        const form = document.getElementById('uploadForm');
        const btn = document.getElementById('submitBtn');
        const overlay = document.getElementById('overlay');
        const overlayText = document.getElementById('overlayText');
        const spinner = document.getElementById('spinner');

        const show = (text, loading) => {
          if (!overlay) return;
          const msg = String(text || '').trim();
          if (overlayText) {
            overlayText.textContent = msg;
          } else {
            overlay.textContent = msg;
          }
          if (spinner) spinner.style.display = loading ? 'inline-block' : 'none';
          overlay.classList.toggle('show', !!msg);
        };

        if (!form) return;

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          show('正在上传并解析简历，请稍候...', true);
          if (btn) {
            btn.disabled = true;
            btn.textContent = '处理中...';
          }

          try {
            const res = await fetch(form.action, {
              method: 'POST',
              headers: { Accept: 'application/json' },
              body: new FormData(form),
            });
            const data = await res.json().catch(() => ({}));
            if (data && data.ok && data.redirect) {
              window.location.href = data.redirect;
              return;
            }
            show((data && data.error) || '上传失败，请稍后重试。', false);
          } catch (_) {
            show('上传失败，请检查网络后重试。', false);
          } finally {
            if (btn) {
              btn.disabled = false;
              btn.textContent = '上传并继续答题';
            }
            if (spinner) spinner.style.display = 'none';
          }
        });
      })();
    </script>
  </body>
</html>
